name: Refresh Listing Data

on:
  schedule:
    - cron: '15 11 * * *'  # 6:15 AM EST (UTC-5) — full digest
    - cron: '0 0 * * *'    # 7 PM EST (UTC-5) — hot deals only
  workflow_dispatch:
    inputs:
      mode:
        description: 'Digest mode (full or evening)'
        required: false
        default: 'full'

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch active for-sale listings
        run: python3 scripts/fetch_active_listings.py

      - name: Score active listings
        run: python3 scripts/score_active_listings.py

      - name: Fetch rental listings
        run: python3 scripts/fetch_rental_listings.py

      - name: Score rental listings
        run: python3 scripts/score_rental_listings.py

      - name: Detect changes
        run: |
          if [ "${{ steps.mode.outputs.mode }}" = "evening" ]; then
            python3 scripts/detect_changes.py --no-rotate
          else
            python3 scripts/detect_changes.py
          fi

      - name: Determine digest mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          INPUT_MODE="${{ github.event.inputs.mode }}"
          if [ "$INPUT_MODE" = "evening" ] || [ "$HOUR" = "00" ]; then
            echo "mode=evening" >> $GITHUB_OUTPUT
          else
            echo "mode=full" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram digest
        run: |
          if [ "${{ steps.mode.outputs.mode }}" = "evening" ]; then
            python3 scripts/send_telegram_digest.py --evening
          else
            python3 scripts/send_telegram_digest.py
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/ scripts/data/previous-snapshot.json scripts/data/previous-rental-snapshot.json scripts/data/rental-listings-raw.json
          git diff --staged --quiet || git commit -m "chore: daily data refresh $(date +%Y-%m-%d-%H%M)"
          git push
