name: Refresh Listing Data

on:
  schedule:
    - cron: '0 11 * * *'  # 6 AM EST daily
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Process sold properties baseline
        run: python3 scripts/process_properties.py

      - name: Fetch active listings
        run: python3 scripts/fetch_active_listings.py

      - name: Score active listings
        run: python3 scripts/score_active_listings.py

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: daily data refresh $(date +%Y-%m-%d)"
          git push
